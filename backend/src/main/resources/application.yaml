spring:
  application:
    name: fsp_starter
  datasource:
    url: jdbc:postgresql://localhost:5432/fsp_starter
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
server:
  port: 8222

